<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academic Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card animate-fade-in">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AMS Portal</h2>
                <p class="text-secondary small">Enter your credentials to access the system</p>
            </div>
            
            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-semibold text-secondary">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" required placeholder="e.g. admin or john_doe">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-lg w-100 gradient-btn">Log In</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem("accessToken")) {
            window.location.href = "index.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value;
            const errorAlert = document.getElementById("errorAlert");

            errorAlert.classList.add("d-none");

            try {
                const response = await fetch("http://localhost:8080/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    localStorage.setItem("accessToken", result.data.accessToken);
                    localStorage.setItem("refreshToken", result.data.refreshToken);
                    localStorage.setItem("username", result.data.username);
                    localStorage.setItem("userRole", result.data.role);

                    window.location.href = "index.html";
                } else {
                    errorAlert.innerText = result.message || "Invalid credentials. Please check and try again.";
                    errorAlert.classList.remove("d-none");
                }
            } catch (err) {
                console.error(err);
                errorAlert.innerText = "Network error. Unable to connect to server.";
                errorAlert.classList.remove("d-none");
            }
        });
    </script>
</body>
</html>
